---
- name: Auto-heal - start and validate service
  hosts: local
  become: yes
  gather_facts: yes

  vars:
    target_service: "{{ service_name | default('nginx') }}"

  tasks:

    # ------------------------------------------------------------
    # Step 1 - Verify execution host
    # ------------------------------------------------------------

    - name: Show hostname
      ansible.builtin.command: hostname
      register: hostout

    - name: Display hostname
      ansible.builtin.debug:
        var: hostout.stdout

    # ------------------------------------------------------------
    # Step 2 - Display selected target service
    # ------------------------------------------------------------

    - name: Display selected target service
      ansible.builtin.debug:
        msg: "Target service is {{ target_service }}"

    # ------------------------------------------------------------
    # Step 3 - Check current service status
    # ------------------------------------------------------------

    - name: Check current service status
      ansible.builtin.systemd:
        name: "{{ target_service }}"
      register: svc_pre
      ignore_errors: yes

    - name: Display current service state
      ansible.builtin.debug:
        msg: "Current state of {{ target_service }} is {{ svc_pre.status.ActiveState | default('unknown') }}"

    # ------------------------------------------------------------
    # Step 4 - Start target service
    # ------------------------------------------------------------

    - name: Start target service
      ansible.builtin.systemd:
        name: "{{ target_service }}"
        state: started
        enabled: yes
      register: svc_start

    # ------------------------------------------------------------
    # Step 5 - Wait for stabilization
    # ------------------------------------------------------------

    - name: Wait for service stabilization
      ansible.builtin.pause:
        seconds: "{{ 20 if target_service in ['mysql', 'mysqld', 'mariadb'] else 10 }}"

    # ------------------------------------------------------------
    # Step 6 - Verify service status
    # ------------------------------------------------------------

    - name: Verify service is active
      ansible.builtin.systemd:
        name: "{{ target_service }}"
      register: svc_post

    - name: Fail if service is not active
      ansible.builtin.fail:
        msg: "Service {{ target_service }} failed to start"
      when: svc_post.status.ActiveState != "active"

    # ------------------------------------------------------------
    # Step 7 - Nginx validation
    # ------------------------------------------------------------

    - name: Validate nginx HTTP response
      ansible.builtin.uri:
        url: http://localhost
        status_code: 200
      when: target_service == "nginx"

    # ------------------------------------------------------------
    # Step 8 - MySQL validation
    # ------------------------------------------------------------

    - name: Validate MySQL process
      ansible.builtin.command:
        cmd: systemctl is-active {{ target_service }}
      register: mysql_check
      changed_when: false
      when: target_service in ["mysql", "mysqld", "mariadb"]

    - name: Display MySQL validation result
      ansible.builtin.debug:
        var: mysql_check.stdout
      when: target_service in ["mysql", "mysqld", "mariadb"]

    # ------------------------------------------------------------
    # Step 9 - Final status
    # ------------------------------------------------------------

    - name: Display final service status
      ansible.builtin.debug:
        msg: "Service {{ target_service }} is successfully running"
