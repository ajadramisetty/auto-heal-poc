---
- name: Auto-heal - nginx service

  hosts: local
  become: yes
  gather_facts: yes

  vars:
    target_service: "nginx"
    snow_instance: "https://dev396422.service-now.com"
    snow_user: "admin"
    snow_password: "v9gNUb6@/eJI"

  tasks:

    # ------------------------------------------------------------
    # Step 1 - Verify execution host
    # ------------------------------------------------------------

    - name: Show hostname
      ansible.builtin.command: hostname
      register: hostout

    - name: Display hostname
      ansible.builtin.debug:
        var: hostout.stdout

    # ------------------------------------------------------------
    # Step 2 - Check current nginx status
    # ------------------------------------------------------------

    - name: Check nginx service status
      ansible.builtin.systemd:
        name: "{{ target_service }}"
      register: svc_pre
      ignore_errors: yes

    - name: Display nginx current state
      ansible.builtin.debug:
        msg: "Current state of nginx is {{ svc_pre.status.ActiveState | default('unknown') }}"

    # ------------------------------------------------------------
    # Step 3 - Demo delay for visibility
    # ------------------------------------------------------------

    - name: Delay for demo visibility
      ansible.builtin.pause:
        seconds: 60
        prompt: ">>> Waiting 60 seconds for demo visibility before remediation..."

    # ------------------------------------------------------------
    # Step 4 - Ensure nginx log directory exists
    # ------------------------------------------------------------

    - name: Ensure nginx log directory exists
      ansible.builtin.file:
        path: /var/log/nginx
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Ensure nginx log files exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: touch
        owner: www-data
        group: www-data
        mode: '0644'
      loop:
        - /var/log/nginx/error.log
        - /var/log/nginx/access.log

    # ------------------------------------------------------------
    # Step 5 - Start nginx service
    # ------------------------------------------------------------

    - name: Start nginx service
      ansible.builtin.systemd:
        name: "{{ target_service }}"
        state: started
        enabled: yes
      register: svc_start

    # ------------------------------------------------------------
    # Step 6 - Wait for stabilization
    # ------------------------------------------------------------

    - name: Wait for nginx stabilization
      ansible.builtin.pause:
        seconds: 10

    # ------------------------------------------------------------
    # Step 7 - Verify nginx status
    # ------------------------------------------------------------

    - name: Verify nginx is active
      ansible.builtin.systemd:
        name: "{{ target_service }}"
      register: svc_post

    - name: Fail if nginx is not active
      ansible.builtin.fail:
        msg: "nginx failed to start"
      when: svc_post.status.ActiveState != "active"

    # ------------------------------------------------------------
    # Step 8 - Validate nginx HTTP response
    # ------------------------------------------------------------

    - name: Validate nginx HTTP response
      ansible.builtin.uri:
        url: http://localhost
        status_code: 200

    # ------------------------------------------------------------
    # Step 9 - Display final status
    # ------------------------------------------------------------

    - name: Display final nginx status
      ansible.builtin.debug:
        msg: "nginx service is successfully running"

    # ------------------------------------------------------------
    # Step 10 - Find latest open Auto-Heal incident
    # ------------------------------------------------------------

    - name: Find latest open Auto-Heal incident
      ansible.builtin.uri:
        url: "{{ snow_instance }}/api/now/table/incident?sysparm_query=assignment_group.name=Auto-Heal^short_descriptionLIKEnginx^state=1^ORDERBYDESCsys_created_on&sysparm_limit=1"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        return_content: yes
        headers:
          Accept: application/json
      register: snow_get

    - name: Display found incident
      ansible.builtin.debug:
        msg: "Found incident: {{ snow_get.json.result[0].number | default('NONE') }}"
      when: snow_get.json.result | length > 0

    # ------------------------------------------------------------
    # Step 11 - Resolve ServiceNow Incident
    # ------------------------------------------------------------

    - name: Resolve the SNOW incident
      ansible.builtin.uri:
        url: "{{ snow_instance }}/api/now/table/incident/{{ snow_get.json.result[0].sys_id }}"
        method: PATCH
        user: "{{ snow_user }}"
        password: "{{ snow_password }}"
        force_basic_auth: yes
        headers:
          Content-Type: application/json
          Accept: application/json
        body_format: json
        body:
          state: "6"
          close_code: "Solution provided"
          close_notes: >-
            Auto-healed by Ansible via Semaphore.
            nginx restarted on {{ ansible_hostname }}
            at {{ ansible_date_time.iso8601 }}.
          work_notes: >-
            [Auto-Heal] nginx remediation completed successfully.
            Service is now active.
        status_code: 200
      when:
        - snow_get.json.result | length > 0
